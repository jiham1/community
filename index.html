<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개발 갤러리 - 디시스타일</title>
    <style>
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; font-size: 12px; color: #333; background: #fff; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; border: 1px solid #ccc; padding: 15px; }
        .gallery-title { font-size: 22px; font-weight: bold; color: #294870; border-bottom: 2px solid #294870; padding-bottom: 10px; margin-bottom: 15px; }
        
        /* 게시글 테이블 */
        .post-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .post-table th { background: #fbfbfd; border-top: 1px solid #ddd; border-bottom: 1px solid #ddd; padding: 10px; text-align: center; color: #666; font-weight: normal; }
        .post-table td { border-bottom: 1px solid #eee; padding: 10px; text-align: center; color: #666; }
        .post-table .td-title { text-align: left; color: #333; cursor: pointer; }
        .post-table tr:hover td { background: #f9f9f9; }

        /* 글쓰기 영역 */
        .write-box { background: #fbfbfd; border: 1px solid #ddd; padding: 20px; margin-top: 30px; border-radius: 4px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-row input { border: 1px solid #ccc; padding: 8px; font-size: 12px; width: 180px; }
        .title-row input { width: 100%; border: 1px solid #ccc; padding: 8px; font-size: 12px; box-sizing: border-box; }
        .content-row textarea { width: 100%; height: 120px; border: 1px solid #ccc; padding: 10px; font-size: 12px; margin-top: 10px; box-sizing: border-box; resize: none; }
        .btn-submit { background: #294870; color: white; border: none; padding: 10px 25px; font-size: 13px; font-weight: bold; cursor: pointer; float: right; margin-top: 10px; }
        .btn-submit:hover { background: #1f3552; }
        .clear { clear: both; }
    </style>
</head>
<body>
    <div class="container">
        <div class="gallery-title">개발 갤러리</div>
        
        <table class="post-table">
            <thead>
                <tr>
                    <th style="width: 50px;">번호</th>
                    <th>제목</th>
                    <th style="width: 120px;">글쓴이</th>
                    <th style="width: 80px;">날짜</th>
                </tr>
            </thead>
            <tbody id="post-list">
                </tbody>
        </table>

        <div class="write-box">
            <div class="input-row">
                <input id="author" type="text" placeholder="닉네임">
                <input id="password" type="password" placeholder="비밀번호">
            </div>
            <div class="title-row">
                <input id="title" type="text" placeholder="제목을 입력하세요">
            </div>
            <div class="content-row">
                <textarea id="content" placeholder="내용을 입력하세요"></textarea>
            </div>
            <button class="btn-submit" onclick="submitPost()">등록</button>
            <div class="clear"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
         
        // 예: const socket = io("https://my-app.onrender.com");
        const socket = io(); 

        const postList = document.getElementById('post-list');

        function formatDate(dateString) {
            const date = new Date(dateString);
            return `${date.getMonth() + 1}.${date.getDate()}`;
        }

        function addPostToTable(post, isNew = false) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>-</td>
                <td class="td-title">${post.title}</td>
                <td>${post.author}</td>
                <td>${formatDate(post.created_at)}</td>
            `;
            if (isNew) postList.prepend(tr);
            else postList.appendChild(tr);
        }

        socket.on('load posts', (posts) => {
            postList.innerHTML = '';
            posts.forEach(post => addPostToTable(post));
        });

        socket.on('new post notification', (post) => {
            addPostToTable(post, true);
        });

        async function submitPost() {
            const author = document.getElementById('author').value;
            const password = document.getElementById('password').value;
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;

            if (!author || !password || !title || !content) return alert("빈칸을 채워주세요!");

            const response = await fetch('/api/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ author, password, title, content })
            });

            if (response.ok) {
                document.getElementById('title').value = '';
                document.getElementById('content').value = '';
            } else {
                alert("등록 실패!");
            }
        }
    </script>
</body>
</html>
<style>
    .post-content-area { display: none; background: #f9f9f9; padding: 15px; border-bottom: 1px solid #ddd; }
    .content-text { font-size: 14px; line-height: 1.6; margin-bottom: 20px; white-space: pre-wrap; }
    
    /* 댓글 스타일 */
    .comment-section { border-top: 1px dashed #ccc; padding-top: 10px; }
    .comment-item { font-size: 11px; padding: 5px 0; border-bottom: 1px solid #eee; }
    .comment-author { font-weight: bold; color: #294870; margin-right: 10px; }
    
    .comment-form { margin-top: 10px; display: flex; gap: 5px; }
    .comment-form input { font-size: 11px; padding: 5px; border: 1px solid #ccc; }
    .btn-comment { background: #666; color: #fff; border: none; padding: 5px 10px; cursor: pointer; }
</style>

<script>
    const socket = io(); // 친구는 여기에 내 주소!

    // 글 목록 그리기 (클릭 이벤트 추가)
    function addPostToTable(post, isNew = false) {
        const tr = document.createElement('tr');
        tr.setAttribute('id', `post-${post.id}`);
        tr.innerHTML = `
            <td>-</td>
            <td class="td-title" onclick="togglePost(${post.id})"><b>${post.title}</b></td>
            <td>${post.author}</td>
            <td>${formatDate(post.created_at)}</td>
        `;
        
        // 내용 및 댓글 영역 (숨겨져 있음)
        const contentTr = document.createElement('tr');
        contentTr.id = `content-${post.id}`;
        contentTr.className = 'post-content-area';
        contentTr.innerHTML = `
            <td colspan="4">
                <div class="content-text">${post.content}</div>
                <div class="comment-section">
                    <div id="comments-${post.id}"></div>
                    <div class="comment-form">
                        <input id="c-auth-${post.id}" placeholder="닉네임" style="width:60px">
                        <input id="c-text-${post.id}" placeholder="댓글 내용" style="flex:1">
                        <button class="btn-comment" onclick="submitComment(${post.id})">등록</button>
                    </div>
                </div>
            </td>
        `;

        if (isNew) {
            postList.prepend(contentTr);
            postList.prepend(tr);
        } else {
            postList.appendChild(tr);
            postList.appendChild(contentTr);
        }
    }

    // 제목 클릭 시 내용 펼치기
    async function togglePost(postId) {
        const area = document.getElementById(`content-${postId}`);
        if (area.style.display === 'table-row') {
            area.style.display = 'none';
        } else {
            area.style.display = 'table-row';
            loadComments(postId); // 펼칠 때 댓글 불러오기
        }
    }

    // 댓글 불러오기
    async function loadComments(postId) {
        const res = await fetch(`/api/comments/${postId}`);
        const comments = await res.json();
        const div = document.getElementById(`comments-${postId}`);
        div.innerHTML = comments.map(c => `
            <div class="comment-item">
                <span class="comment-author">${c.author}</span>
                <span>${c.content}</span>
            </div>
        `).join('');
    }

    // 댓글 등록
    async function submitComment(postId) {
        const author = document.getElementById(`c-auth-${postId}`).value;
        const content = document.getElementById(`c-text-${postId}`).value;
        if(!author || !content) return alert("내용을 입력하세요");

        await fetch('/api/posts/../api/comments', { // 경로 주의
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ post_id: postId, author, content })
        });
        
        document.getElementById(`c-text-${postId}`).value = '';
        loadComments(postId); // 댓글 새로고침
    }

    // 실시간 댓글 업데이트
    socket.on('new comment', (data) => {
        const commentDiv = document.getElementById(`comments-${data.post_id}`);
        if (commentDiv) loadComments(data.post_id);
    });
</script>
