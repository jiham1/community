<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>개발 커뮤니티</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; font-size: 13px; margin: 0; padding: 20px; background: #eee; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; border: 1px solid #ccc; padding: 20px; min-height: 500px; }
        h1 { color: #294870; cursor: pointer; border-bottom: 2px solid #294870; padding-bottom: 10px; }
        
        /* 목록 스타일 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f8f8; border-top: 1px solid #ccc; border-bottom: 1px solid #ccc; padding: 10px; }
        td { border-bottom: 1px solid #eee; padding: 10px; text-align: center; }
        .title-link { text-align: left; color: #333; text-decoration: none; font-weight: bold; cursor: pointer; }
        
        /* 상세 페이지 스타일 */
        .post-view { display: none; }
        .post-header { border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 20px; }
        .post-title { font-size: 20px; font-weight: bold; }
        .post-info { color: #888; font-size: 12px; margin-top: 5px; }
        .post-body { font-size: 15px; line-height: 1.8; min-height: 200px; white-space: pre-wrap; padding: 20px 0; }
        
        /* 추천/비추천 버튼 */
        .vote-area { text-align: center; margin: 30px 0; }
        .vote-btn { padding: 10px 20px; margin: 0 5px; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 5px; }
        .btn-up { color: #ff4500; border-color: #ff4500; }
        .btn-down { color: #1e90ff; border-color: #1e90ff; }
        
        /* 댓글 영역 */
        .comment-area { background: #f9f9f9; padding: 15px; border-top: 1px solid #ddd; }
        .c-item { border-bottom: 1px solid #eee; padding: 8px 0; }
        .c-form { margin-top: 15px; display: flex; gap: 5px; }
        .c-form input { padding: 8px; border: 1px solid #ccc; }
        
        /* 글쓰기 영역 */
        .write-area { margin-top: 40px; padding: 20px; border: 1px solid #ddd; background: #fcfcfc; }
        .write-area input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-main { background: #294870; color: #fff; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1 onclick="location.href='/'">개발 갤러리</h1>

    <div id="list-view">
        <table>
            <thead><tr><th>제목</th><th width="100">글쓴이</th><th width="60">추천</th><th width="80">날짜</th></tr></thead>
            <tbody id="post-list"></tbody>
        </table>
        <div class="write-area">
            <h3>새 글 쓰기</h3>
            <input id="w-auth" placeholder="닉네임" style="width:49%">
            <input id="w-pw" type="password" placeholder="비밀번호" style="width:49%">
            <input id="w-title" placeholder="제목">
            <textarea id="w-content" rows="6" placeholder="내용을 입력하세요"></textarea>
            <button class="btn-main" onclick="submitPost()">등록하기</button>
        </div>
    </div>

    <div id="post-view" class="post-view">
        <div class="post-header">
            <div id="v-title" class="post-title"></div>
            <div id="v-info" class="post-info"></div>
        </div>
        <div id="v-content" class="post-body"></div>
        
        <div class="vote-area">
            <button class="vote-btn btn-up" onclick="vote('up')">추천 <span id="v-up">0</span></button>
            <button class="vote-btn btn-down" onclick="vote('down')">비추천 <span id="v-down">0</span></button>
        </div>

        <div class="comment-area">
            <h4>댓글</h4>
            <div id="c-list"></div>
            <div class="c-form">
                <input id="ci-a" placeholder="닉네임" style="width:80px">
                <input id="ci-c" placeholder="댓글 내용" style="flex:1">
                <button onclick="addComment()">등록</button>
            </div>
        </div>
        <button class="btn-main" style="margin-top:20px; background:#666;" onclick="location.href='/'">목록으로</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); // 친구는 여기에 내 Render 주소!
    const path = window.location.pathname;

    // 페이지 로드 시 처리
    window.onload = () => {
        if (path.startsWith('/post/')) {
            const id = path.split('/')[2];
            showDetail(id);
        } else {
            showList();
        }
    };

    // 목록 보여주기
    async function showList() {
        document.getElementById('list-view').style.display = 'block';
        const res = await fetch('/api/posts');
        const posts = await res.json();
        const list = document.getElementById('post-list');
        list.innerHTML = posts.map(p => `
            <tr>
                <td class="title-link" onclick="location.href='/post/${p.id}'">${p.title}</td>
                <td>${p.author}</td>
                <td style="color:#ff4500">${p.likes}</td>
                <td>${p.created_at.slice(5,10)}</td>
            </tr>
        `).join('');
    }

    // 상세 내용 보여주기
    async function showDetail(id) {
        document.getElementById('list-view').style.display = 'none';
        document.getElementById('post-view').style.display = 'block';
        
        const res = await fetch(`/api/posts/${id}`);
        const p = await res.json();
        
        document.getElementById('v-title').innerText = p.title;
        document.getElementById('v-info').innerText = `글쓴이: ${p.author} | 날짜: ${p.created_at.replace('T', ' ').slice(0,16)}`;
        document.getElementById('v-content').innerText = p.content;
        document.getElementById('v-up').innerText = p.likes;
        document.getElementById('v-down').innerText = p.dislikes;
        
        loadComments(id);
    }

    // 새 글 등록
    async function submitPost() {
        const data = {
            author: document.getElementById('w-auth').value,
            password: document.getElementById('w-pw').value,
            title: document.getElementById('w-title').value,
            content: document.getElementById('w-content').value
        };
        if(!data.title || !data.content) return alert("내용을 입력하세요");
        await fetch('/api/posts', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)});
        location.reload();
    }

    // 추천/비추천 기능
    async function vote(type) {
        const id = window.location.pathname.split('/')[2];
        const res = await fetch(`/api/posts/${id}/vote`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ type })
        });
        const updated = await res.json();
        document.getElementById('v-up').innerText = updated.likes;
        document.getElementById('v-down').innerText = updated.dislikes;
    }

    // 댓글 기능
    async function loadComments(postId) {
        const res = await fetch(`/api/comments/${postId}`);
        const data = await res.json();
        document.getElementById('c-list').innerHTML = data.map(c => `
            <div class="c-item"><b>${c.author}</b>: ${c.content}</div>
        `).join('');
    }

    async function addComment() {
        const postId = window.location.pathname.split('/')[2];
        const author = document.getElementById('ci-a').value;
        const content = document.getElementById('ci-c').value;
        await fetch('/api/comments', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ post_id: postId, author, content })
        });
        document.getElementById('ci-c').value = '';
        loadComments(postId);
    }

    socket.on('new post', () => { if(window.location.pathname === '/') showList(); });
</script>
</body>
</html>
