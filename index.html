<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>커뮤니티</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border: 1px solid #ccc; min-height: 600px; border-radius: 8px; }
        h1 { color: #294870; cursor: pointer; text-align: center; margin-bottom: 30px; }
        
        /* 목록 화면 */
        .list-view table { width: 100%; border-collapse: collapse; }
        .list-view th { background: #f8f9fa; border-bottom: 2px solid #ddd; padding: 12px; font-size: 14px; }
        .list-view td { border-bottom: 1px solid #eee; padding: 12px; text-align: center; }
        .title-link { text-align: left; font-weight: bold; cursor: pointer; color: #333; font-size: 15px; }
        .title-link:hover { color: #294870; text-decoration: underline; }
        
        /* 상세 화면 (기본 숨김) */
        #post-view { display: none; }
        .post-header { border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .v-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .v-info { color: #888; font-size: 12px; }
        .v-content { font-size: 16px; line-height: 1.8; white-space: pre-wrap; padding: 20px 0; border-bottom: 1px solid #eee; }
        
        /* 추천 영역 */
        .vote-box { text-align: center; margin: 30px 0; }
        .vote-btn { padding: 10px 20px; margin: 0 5px; cursor: pointer; border: 1px solid #ddd; background: #fff; border-radius: 4px; font-weight: bold; }
        .btn-up { color: #ff4500; border-color: #ff4500; }
        .btn-down { color: #1e90ff; border-color: #1e90ff; }

        /* 댓글 영역 */
        .comment-area { background: #f9f9f9; padding: 20px; border-radius: 4px; }
        .c-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 13px; }
        .c-auth { font-weight: bold; margin-right: 10px; color: #294870; }
        .c-form { display: flex; gap: 5px; margin-top: 15px; }
        .c-form input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }

        /* 글쓰기 폼 */
        .write-form { margin-top: 40px; padding: 20px; border-top: 2px solid #294870; }
        .write-form input, .write-form textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn-post { background: #294870; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-size: 16px; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1 onclick="location.href='/'">개발 갤러리</h1>

    <div id="list-view">
        <table>
            <thead><tr><th>제목</th><th width="100">글쓴이</th><th width="60">추천</th><th width="80">날짜</th></tr></thead>
            <tbody id="post-list"></tbody>
        </table>
        <div class="write-form">
            <div style="display:flex; gap:10px;">
                <input id="w-auth" placeholder="닉네임">
                <input id="w-pw" type="password" placeholder="비밀번호">
            </div>
            <input id="w-title" placeholder="글 제목을 입력하세요">
            <textarea id="w-content" rows="6" placeholder="내용을 입력하세요"></textarea>
            <button class="btn-post" onclick="submitPost()">등록하기</button>
        </div>
    </div>

    <div id="post-view">
        <div class="post-header">
            <div id="v-title" class="v-title"></div>
            <div id="v-info" class="v-info"></div>
        </div>
        <div id="v-content" class="v-content"></div>
        
        <div class="vote-box">
            <button class="vote-btn btn-up" onclick="vote('up')">추천 <span id="v-up">0</span></button>
            <button class="vote-btn btn-down" onclick="vote('down')">비추천 <span id="v-down">0</span></button>
        </div>

        <div class="comment-area">
            <div id="c-list"></div>
            <div class="c-form">
                <input id="ci-a" placeholder="닉네임" style="width:100px;">
                <input id="ci-c" placeholder="댓글 내용" style="flex:1;">
                <button onclick="addComment()" style="cursor:pointer; padding: 0 15px;">등록</button>
            </div>
        </div>
        <button onclick="location.href='/'" style="margin-top:20px; width:100%; padding:10px; cursor:pointer;">목록으로 돌아가기</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); 
    const path = window.location.pathname;

    // 초기 실행: 주소창 확인 후 목록 혹은 상세페이지 표시
    window.onload = () => {
        if (path.startsWith('/post/')) {
            const id = path.split('/')[2];
            showDetail(id);
        } else {
            loadList();
        }
    };

    // [목록] 데이터 불러오기
    async function loadList() {
        document.getElementById('list-view').style.display = 'block';
        document.getElementById('post-view').style.display = 'none';
        const res = await fetch('/api/posts');
        const posts = await res.json();
        const list = document.getElementById('post-list');
        list.innerHTML = posts.map(p => `
            <tr>
                <td class="title-link" onclick="location.href='/post/${p.id}'">${p.title}</td>
                <td>${p.author}</td>
                <td style="color:#ff4500; font-weight:bold;">${p.likes}</td>
                <td>${p.created_at.slice(5,10)}</td>
            </tr>
        `).join('');
    }

    // [상세] 데이터 불러오기 (내용이 안 뜨는 현상 방지)
    async function showDetail(id) {
        document.getElementById('list-view').style.display = 'none';
        document.getElementById('post-view').style.display = 'block';
        
        const res = await fetch(`/api/get-post/${id}`);
        const p = await res.json();
        if(!p) return alert("삭제된 글입니다.");

        document.getElementById('v-title').innerText = p.title;
        document.getElementById('v-info').innerText = `작성자: ${p.author} | 날짜: ${p.created_at.slice(0,10)}`;
        document.getElementById('v-content').innerText = p.content;
        document.getElementById('v-up').innerText = p.likes;
        document.getElementById('v-down').innerText = p.dislikes;
        
        loadComments(id);
    }

    // [글등록]
    async function submitPost() {
        const auth = document.getElementById('w-auth').value;
        const title = document.getElementById('w-title').value;
        const content = document.getElementById('w-content').value;
        if(!title || !content) return alert("내용을 입력해주세요.");

        await fetch('/api/posts', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ author: auth, title, content, password: document.getElementById('w-pw').value })
        });
        location.href = '/'; // 등록 후 메인으로
    }

    // [추천]
    async function vote(type) {
        const id = window.location.pathname.split('/')[2];
        const res = await fetch(`/api/vote/${id}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ type })
        });
        const updated = await res.json();
        document.getElementById('v-up').innerText = updated.likes;
        document.getElementById('v-down').innerText = updated.dislikes;
    }

    // [댓글]
    async function loadComments(postId) {
        const res = await fetch(`/api/comments/${postId}`);
        const data = await res.json();
        document.getElementById('c-list').innerHTML = data.map(c => `
            <div class="c-item"><span class="c-auth">${c.author}</span> ${c.content}</div>
        `).join('');
    }

    async function addComment() {
        const postId = window.location.pathname.split('/')[2];
        const author = document.getElementById('ci-a').value;
        const content = document.getElementById('ci-c').value;
        if(!content) return;
        await fetch('/api/comments', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ post_id: postId, author, content })
        });
        document.getElementById('ci-c').value = '';
        loadComments(postId);
    }

    socket.on('update', () => { if(window.location.pathname === '/') loadList(); });
</script>
</body>
</html>
