<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECH GALLERY</title>
    <style>
        /* 디시인사이드 스타일 기반 다크 테마 */
        body { font-family: 'Malgun Gothic', sans-serif; background: #121212; color: #e1e1e1; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #1e1e1e; padding: 20px; border: 1px solid #333; }
        
        h1 { color: #00ff41; font-size: 24px; cursor: pointer; border-bottom: 2px solid #00ff41; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* 게시글 목록 스타일 */
        .post-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        .post-table th { background: #252525; padding: 10px; border-bottom: 1px solid #444; color: #888; font-size: 13px; }
        .post-table td { padding: 12px 10px; border-bottom: 1px solid #333; text-align: center; font-size: 14px; }
        .post-table .title-cell { text-align: left; cursor: pointer; color: #ddd; }
        .post-table .title-cell:hover { color: #00ff41; text-decoration: underline; }

        /* 글쓰기 구역 */
        .write-section { background: #252525; padding: 20px; border-radius: 5px; border: 1px solid #333; }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-row input { flex: 1; padding: 10px; background: #333; border: 1px solid #444; color: #fff; outline: none; }
        .title-input, .content-input { width: 100%; padding: 10px; background: #333; border: 1px solid #444; color: #fff; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        .content-input { height: 150px; resize: none; }
        .submit-btn { width: 100%; padding: 15px; background: #00ff41; color: #000; font-weight: bold; border: none; cursor: pointer; }
        .submit-btn:hover { background: #00cc33; }

        /* 상세 보기 페이지 */
        #post-view { display: none; }
        .view-header { border-bottom: 1px solid #444; padding-bottom: 15px; margin-bottom: 20px; }
        .view-title { font-size: 22px; color: #00ff41; margin-bottom: 5px; }
        .view-meta { color: #888; font-size: 12px; }
        .view-content { line-height: 1.8; white-space: pre-wrap; margin-bottom: 40px; min-height: 200px; padding: 10px; background: #252525; border-radius: 5px; }

        /* 추천/비추천 버튼 구역 */
        .vote-area { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .vote-btn { background: #333; border: 1px solid #444; padding: 10px 20px; border-radius: 5px; cursor: pointer; color: #fff; font-weight: bold; transition: 0.2s; }
        .vote-btn:hover { background: #444; }
        .up-btn { color: #00ff41; border-color: #00ff41; }
        .down-btn { color: #ff3e3e; border-color: #ff3e3e; }

        .back-btn { background: #444; color: #fff; border: none; padding: 10px 20px; cursor: pointer; border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <h1 onclick="location.href='/'">> TECH_GALLERY</h1>

    <div id="list-view">
        <table class="post-table">
            <thead>
                <tr>
                    <th width="60">NO</th>
                    <th>TITLE</th>
                    <th width="120">AUTHOR</th>
                    <th width="60">UP</th>
                </tr>
            </thead>
            <tbody id="post-list">
                </tbody>
        </table>

        <div class="write-section">
            <div class="input-row">
                <input type="text" id="w-auth" placeholder="닉네임">
                <input type="password" id="w-pw" placeholder="비밀번호">
            </div>
            <input type="text" id="w-title" class="title-input" placeholder="제목을 입력하세요">
            <textarea id="w-content" class="content-input" placeholder="내용을 입력하세요"></textarea>
            <button type="button" class="submit-btn" onclick="postArticle()">UPLOAD</button>
        </div>
    </div>

    <div id="post-view">
        <div class="view-header">
            <div id="v-title" class="view-title"></div>
            <div id="v-meta" class="view-meta"></div>
        </div>
        <div id="v-content" class="view-content"></div>

        <div class="vote-area">
            <button class="vote-btn up-btn" onclick="handleVote('up')">추천 <span id="v-up">0</span></button>
            <button class="vote-btn down-btn" onclick="handleVote('down')">비추천 <span id="v-down">0</span></button>
        </div>

        <button class="back-btn" onclick="location.href='/'">BACK TO LIST</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const path = window.location.pathname;

    // 1. 초기 로드 시 경로 확인 (목록 혹은 상세글)
    window.onload = () => {
        if (path.startsWith('/post/')) {
            const postId = path.split('/')[2];
            showDetail(postId);
        } else {
            loadList();
        }
    };

    // 2. 게시글 목록 불러오기
    async function loadList() {
        try {
            const res = await fetch('/api/posts');
            const posts = await res.json();
            const listBody = document.getElementById('post-list');
            
            listBody.innerHTML = posts.map(p => `
                <tr>
                    <td>${p.id}</td>
                    <td class="title-cell" onclick="location.href='/post/${p.id}'">${p.title}</td>
                    <td>${p.author}</td>
                    <td style="color:#00ff41">${p.likes}</td>
                </tr>
            `).join('');
        } catch (err) {
            console.error("목록 로드 실패:", err);
        }
    }

    // 3. 게시글 상세 보기
    async function showDetail(id) {
        document.getElementById('list-view').style.display = 'none';
        document.getElementById('post-view').style.display = 'block';

        try {
            const res = await fetch(`/api/get-post/${id}`);
            const p = await res.json();

            if (!p) {
                alert("존재하지 않는 게시글입니다.");
                location.href = '/';
                return;
            }

            document.getElementById('v-title').innerText = p.title;
            document.getElementById('v-meta').innerText = `작성자: ${p.author} | 작성일: ${new Date(p.created_at).toLocaleString()}`;
            document.getElementById('v-content').innerText = p.content;
            document.getElementById('v-up').innerText = p.likes || 0;
            document.getElementById('v-down').innerText = p.dislikes || 0;
        } catch (err) {
            alert("게시글을 불러오는 중 오류가 발생했습니다.");
        }
    }

    // 4. 글쓰기 등록 (사칭 방지/비밀번호 체크 로직 포함)
    async function postArticle() {
        const author = document.getElementById('w-auth').value;
        const password = document.getElementById('w-pw').value;
        const title = document.getElementById('w-title').value;
        const content = document.getElementById('w-content').value;

        if (!author || !password || !title || !content) {
            return alert("모든 칸을 채워주세요!");
        }

        try {
            const res = await fetch('/api/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ author, password, title, content })
            });

            if (res.ok) {
                alert("게시물이 등록되었습니다.");
                location.href = '/'; // 등록 성공 시 목록으로
            } 
            // 서버에서 사칭 방지(403) 에러를 보냈을 경우
            else if (res.status === 403) {
                const errorText = await res.text();
                alert(errorText); // "이미 존재하는 닉네임입니다. 비밀번호가 일치하지 않습니다."
                document.getElementById('w-pw').focus(); // 비번 입력칸으로 커서 이동
            } 
            else {
                alert("서버 오류가 발생했습니다.");
            }
        } catch (err) {
            alert("네트워크 연결 실패!");
        }
    }

    // 5. 추천/비추천 처리
    async function handleVote(type) {
        const id = window.location.pathname.split('/')[2];
        const votedKey = `voted_${id}`;

        // 중복 투표 방지 (브라우저 로컬 스토리지 이용)
        if (localStorage.getItem(votedKey)) {
            return alert("이미 참여하셨습니다.");
        }

        try {
            const res = await fetch(`/api/vote/${id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type })
            });

            if (res.ok) {
                const updated = await res.json();
                document.getElementById('v-up').innerText = updated.likes;
                document.getElementById('v-down').innerText = updated.dislikes;
                localStorage.setItem(votedKey, 'true');
                alert(type === 'up' ? "추천 완료!" : "비추천 완료!");
            }
        } catch (err) {
            console.error("투표 실패:", err);
        }
    }

    // 6. 실시간 목록 업데이트 수신
    socket.on('update', () => {
        // 상세 페이지가 아닐 때만 목록을 새로고침
        if (!window.location.pathname.startsWith('/post/')) {
            loadList();
        }
    });
</script>

</body>
</html>
